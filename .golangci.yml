version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - exhaustive
    - exptostd
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - modernize
    - nilerr
    - revive
    - staticcheck
    - testifylint
    - unparam
    - unused

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/kevinpita/lazycosmos)
